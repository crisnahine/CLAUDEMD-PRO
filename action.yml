name: 'claudemd-pro'
description: 'Lint, score, and drift-check your CLAUDE.md for effectiveness — deep codebase-aware analysis with 18 rules and effectiveness scoring'
author: 'crisnahine'
branding:
  icon: 'check-circle'
  color: 'orange'
inputs:
  file:
    description: 'Path to CLAUDE.md'
    required: false
    default: './CLAUDE.md'
  threshold:
    description: 'Minimum score (0-100) to pass'
    required: false
    default: '60'
  strict:
    description: 'Fail on warnings too'
    required: false
    default: 'false'
  check-drift:
    description: 'Run drift detection alongside lint'
    required: false
    default: 'false'
  comment-on-pr:
    description: 'Post results as a PR comment (requires GITHUB_TOKEN)'
    required: false
    default: 'false'
outputs:
  score:
    description: 'Effectiveness score (0-100)'
  errors:
    description: 'Number of lint errors found'
  warnings:
    description: 'Number of lint warnings found'
  drift-items:
    description: 'Number of drift items found (if check-drift enabled)'
runs:
  using: 'node20'
  main: 'dist/github-action/action.js'
